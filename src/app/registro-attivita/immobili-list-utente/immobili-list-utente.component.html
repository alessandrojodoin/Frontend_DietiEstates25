
@if(immobiliList.length === 0){
  <div class="empty-state">
    <p>Qui verranno mostrati gli immobili visualizzati.</p>
  </div>
}

@for(immobile of immobiliList; track immobile){

  

   <div class="immobili-list">
    <div
      class="immobile-card"
    >
      <!-- IMMAGINE -->
      <div class="immobile-img">
        <img
          [src]="url + '/immobile/' + immobile.id + '/image/' + immobile.immagini[0]"
          alt="immagine immobile"
        />

       
      </div>

      <!-- INFO -->
      <div class="immobile-info">
        <div class="nome">
          <a [routerLink]="['/dettagli-immobile', immobile.id]">{{ immobile.nome }}</a>
          
        </div>

        <div class="contratto">
          {{ immobile.tipologiaContratto }}
        </div>

        <div class="prezzo">
          <ng-container *ngIf="immobile.tipologiaContratto === 'affitto'; else vendita">
            ${{ immobile.prezzo }}/mese
          </ng-container>
          <ng-template #vendita>
            ${{ immobile.prezzo }}
          </ng-template>
        </div>
      </div>
    </div>
  </div>

  
}
